<ng-template #modal let-modal>
	<div class="modal-header">
		<h4 class="modal-title" id="modal-basic-title">{{title}}</h4>
		<button type="button" class="btn-close" aria-label="Close" (click)="modal.close(false)"></button>
	</div>
	<div class="modal-body">
        <ng-content></ng-content>
	</div>
	<div class="modal-footer">
		<button type="button" class="btn btn-danger" (click)="modal.close(false)">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="modal.close(true)">Confirm</button>
	</div>
</ng-template>
